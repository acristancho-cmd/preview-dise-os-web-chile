name: run_unit_test
description: Run testing

inputs:
  python-version:
    required: true
    description: "python version"
  ssh-key:
    required: true
    description: "ssh key"
  credentials:
    required: true
    description: "credentials"

runs:
  using: "composite"
  steps:
    - name: 👀 Checkout
      uses: actions/checkout@v4

    - name: 🔑 Generate keys
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ inputs.ssh-key }}

    - name: 📄 Create-json
      uses: jsdaniell/create-json@v1.2.1
      with:
        name: "new-json-file.json"
        json: ${{ inputs.credentials }}
        dir: "./app"

    - name: 🐍 Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: requirements*.txt

    - name: 📃 Set up .env file
      shell: bash
      run: |
        mv example.env .env

    - name: 📦 Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_test.txt

    - name: 👟 Run tests
      shell: bash
      env:
        GOOGLE_APPLICATION_CREDENTIALS: ./app/new-json-file.json
        project_id: trii-dev-325214
      run: pytest --cov=app --cov-report=html:out/report -v

    - name: 🔝 Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: out/report/*
